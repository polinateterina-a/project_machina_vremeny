<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перекрёсток эпох</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: #c8a96e;
            border-radius: 50%;
            animation: float 8s infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        h1 {
            color: #c8a96e;
            font-size: 72px;
            letter-spacing: 15px;
            font-weight: normal;
            text-shadow: 0 0 40px rgba(200, 169, 110, 0.5);
            margin-bottom: 15px;
            animation: titleIn 2s ease-out;
            line-height: 1.2;
        }

        @keyframes titleIn {
            0% { opacity: 0; transform: translateY(-30px); letter-spacing: 30px; }
            100% { opacity: 1; transform: translateY(0); letter-spacing: 15px; }
        }

        .subtitle {
            color: #8b7355;
            font-size: 18px;
            letter-spacing: 8px;
            margin-bottom: 60px;
            font-style: italic;
            animation: subIn 1.5s ease-out 0.5s both;
        }

        @keyframes subIn {
            from { opacity: 0; }
            to { opacity: 0.8; }
        }

        .btn {
            padding: 18px 60px;
            font-size: 20px;
            font-family: 'Georgia', serif;
            letter-spacing: 8px;
            background: transparent;
            color: #c8a96e;
            border: 2px solid #c8a96e;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.6s;
            position: relative;
            overflow: hidden;
            animation: btnIn 1.5s ease-out 1s both;
        }

        @keyframes btnIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn:hover {
            background: rgba(200, 169, 110, 0.1);
            box-shadow: 0 0 40px rgba(200, 169, 110, 0.4);
            letter-spacing: 12px;
            border-color: #deb887;
            color: #deb887;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            background: rgba(200, 169, 110, 0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.8s;
        }

        .btn:hover::after {
            width: 500px; height: 500px;
        }

        .fade-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #1a1a1a;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 2s ease-in;
        }

        .fade-overlay.active { opacity: 1; }

        .smoke-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 101;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .smoke-container.active { opacity: 1; }

        @keyframes smokeRise {
            0% { transform: scale(0.3); opacity: 0; }
            30% { opacity: 0.9; }
            100% { transform: scale(3) translateY(-150px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>
    <div class="fade-overlay" id="fade"></div>
    <div class="smoke-container" id="smokeContainer"></div>

    <div class="container">
        <h1>ПЕРЕКРЁСТОК<br>ЭПОХ</h1>
        <p class="subtitle">исторические прогулки</p>
        <button class="btn" id="travelBtn">ПУТЕШЕСТВОВАТЬ</button>
    </div>

    <script>
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                const size = Math.random() * 4 + 2;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.animationDelay = Math.random() * 8 + 's';
                p.style.animationDuration = (Math.random() * 6 + 6) + 's';
                container.appendChild(p);
            }
        })();

        document.getElementById('travelBtn').addEventListener('click', function(e) {
            const btn = e.target;
            const rect = btn.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;

            const smoke = document.getElementById('smokeContainer');
            smoke.innerHTML = '';
            
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const s = document.createElement('div');
                    const size = Math.random() * 120 + 60;
                    s.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        background: radial-gradient(circle, rgba(200,169,110,0.7) 0%, transparent 70%);
                        border-radius: 50%;
                        left: ${cx + (Math.random() - 0.5) * 300}px;
                        top: ${cy + (Math.random() - 0.5) * 150}px;
                        animation: smokeRise ${Math.random() * 2 + 2}s ease-out forwards;
                        animation-delay: ${Math.random() * 0.3}s;
                    `;
                    smoke.appendChild(s);
                    setTimeout(() => s.remove(), 3000);
                }, i * 60);
            }
            
            smoke.classList.add('active');

            setTimeout(() => {
                document.getElementById('fade').classList.add('active');
            }, 1000);

            setTimeout(() => {
                window.location.href = '/search';
            }, 3000);
        });
    </script>
</body>
</html>
