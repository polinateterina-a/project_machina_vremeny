<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экскурсия — Перекрёсток эпох</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        :root {
            --dark: #1a1a1a;
            --gold: #c8a96e;
            --gold-light: #deb887;
            --brown: #8b7355;
            --blue: #3b6999;
            --blue-light: #5b8ab8;
            --panel-bg: #f5f0e8;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #333;
            min-height: 100vh;
            animation: bodyFadeIn 1s ease-out;
        }

        @keyframes bodyFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .header {
            background: var(--dark);
            padding: 18px 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border-bottom: 1px solid rgba(200, 169, 110, 0.2);
        }

        .header-title {
            color: var(--gold);
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: normal;
            text-transform: uppercase;
        }

        .home-link {
            position: absolute;
            left: 30px;
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 8px 16px;
            border: 1px solid rgba(200, 169, 110, 0.3);
            transition: all 0.3s;
        }

        .home-link:hover { border-color: var(--gold); }

        .main-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            height: calc(100vh - 72px);
        }

        .sidebar {
            background: var(--panel-bg);
            border-right: 1px solid rgba(139, 115, 85, 0.3);
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .sidebar-block {
            background: var(--white);
            border: 1px solid rgba(139, 115, 85, 0.2);
            padding: 16px;
        }

        .block-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: var(--brown);
            text-transform: uppercase;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .block-text {
            font-size: 13px;
            line-height: 1.7;
            color: #555;
            margin-bottom: 10px;
        }

        .audio-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            padding: 6px 12px;
            border: 1px solid rgba(59, 105, 153, 0.3);
            transition: all 0.3s;
            font-size: 12px;
            color: var(--blue);
            letter-spacing: 2px;
        }

        .audio-mini:hover {
            background: rgba(59, 105, 153, 0.05);
            border-color: var(--blue);
        }

        .audio-mini.playing {
            background: var(--blue);
            color: #fff;
            border-color: var(--blue);
        }

        .route-title {
            font-size: 11px;
            letter-spacing: 4px;
            color: var(--brown);
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
            font-weight: bold;
        }

        .locations-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .location-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: var(--white);
            border: 1px solid rgba(139, 115, 85, 0.2);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .location-item:hover {
            border-color: var(--blue-light);
            transform: translateX(4px);
        }

        .location-item.active {
            border-color: var(--blue);
            background: rgba(59, 105, 153, 0.05);
            border-width: 2px;
        }

        .location-item.active::before {
            content: '';
            position: absolute;
            left: -1px; top: -1px; bottom: -1px;
            width: 3px;
            background: var(--blue);
        }

        .location-num {
            width: 30px;
            height: 30px;
            border: 1px solid var(--blue);
            color: var(--blue);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            border-radius: 50%;
            transition: all 0.3s;
        }

        .location-item.active .location-num {
            background: var(--blue);
            color: #fff;
        }

        .location-details { flex: 1; min-width: 0; }
        .location-name { font-size: 13px; color: #333; letter-spacing: 1px; margin-bottom: 2px; }
        .location-addr { font-size: 11px; color: var(--brown); font-style: italic; }

        .map-area { position: relative; background: #2a2a2a; }
        #map { width: 100%; height: 100%; }

        .map-toggle {
            position: absolute;
            top: 15px; right: 15px;
            z-index: 1000;
            display: flex;
            background: rgba(26, 26, 26, 0.9);
            border: 1px solid rgba(200, 169, 110, 0.3);
            overflow: hidden;
        }

        .map-toggle button {
            padding: 10px 20px;
            border: none;
            background: transparent;
            color: var(--brown);
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .map-toggle button.active {
            background: var(--gold);
            color: var(--dark);
        }

        .map-toggle button:hover:not(.active) { color: var(--gold); }

        .map-info-bar {
            position: absolute;
            bottom: 15px; left: 15px; right: 15px;
            background: rgba(26, 26, 26, 0.95);
            border: 1px solid rgba(200, 169, 110, 0.2);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .map-info-bar .info-title {
            color: var(--gold);
            font-size: 13px;
            letter-spacing: 2px;
            flex: 1;
        }

        .map-info-bar .info-stat {
            color: var(--brown);
            font-size: 11px;
            letter-spacing: 1px;
        }

        .custom-marker { background: none !important; border: none !important; }

        .marker-pin {
            width: 34px; height: 34px;
            border-radius: 50%;
            background: var(--dark);
            border: 2px solid var(--gold);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            font-size: 13px;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .active-marker .marker-pin {
            background: var(--blue);
            border-color: var(--blue-light);
            color: #fff;
            box-shadow: 0 0 15px rgba(59, 105, 153, 0.5);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 5000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.98);
            animation: modalFade 0.3s;
        }

        @keyframes modalFade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            position: relative;
            margin: 30px auto;
            width: 90%;
            max-width: 750px;
            max-height: 90vh;
            background: var(--panel-bg);
            border: 1px solid rgba(200, 169, 110, 0.3);
            overflow-y: auto;
            animation: modalSlideUp 0.4s ease-out;
        }

        @keyframes modalSlideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            right: 15px; top: 15px;
            z-index: 10;
            width: 36px; height: 36px;
            border: 1px solid var(--brown);
            color: var(--brown);
            background: var(--panel-bg);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: all 0.3s;
            line-height: 1;
        }

        .modal-close:hover {
            background: #c0392b;
            color: #fff;
            border-color: #c0392b;
        }

        .modal-image-wrap {
            position: relative;
            height: 400px;
            overflow: hidden;
            border-bottom: 1px solid rgba(139, 115, 85, 0.2);
        }

        .modal-image-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .slider-overlay {
            position: absolute;
            bottom: 15px; right: 15px;
        }

        .slider-btn {
            padding: 8px 18px;
            background: rgba(26, 26, 26, 0.85);
            color: var(--gold);
            border: 1px solid rgba(200, 169, 110, 0.4);
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 12px;
            letter-spacing: 2px;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .slider-btn:hover {
            background: rgba(26, 26, 26, 0.95);
            border-color: var(--gold);
        }

        .slider-label {
            position: absolute;
            bottom: 15px; left: 15px;
            color: #fff;
            font-size: 12px;
            letter-spacing: 2px;
            background: rgba(26, 26, 26, 0.7);
            padding: 6px 14px;
            text-transform: uppercase;
        }

        .modal-body { padding: 25px; }
        .modal-body h2 {
            font-size: 22px;
            color: #333;
            letter-spacing: 2px;
            font-weight: normal;
            margin-bottom: 5px;
        }

        .modal-address {
            color: var(--brown);
            font-size: 13px;
            font-style: italic;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modal-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 18px;
        }

        .modal-tags span {
            padding: 4px 14px;
            background: var(--dark);
            color: var(--gold);
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .modal-description {
            line-height: 1.9;
            color: #555;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .audio-player {
            background: var(--dark);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .play-btn {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .play-btn:hover { background: rgba(200, 169, 110, 0.1); }
        .play-btn.playing {
            background: var(--blue);
            border-color: var(--blue);
            color: #fff;
        }

        .progress-wrap {
            flex: 1;
            height: 4px;
            background: rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--gold);
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-wrap input {
            position: absolute;
            top: -16px; left: 0;
            width: 100%; height: 36px;
            opacity: 0;
            cursor: pointer;
        }

        .time-display {
            color: var(--brown);
            font-size: 11px;
            letter-spacing: 1px;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }

        .leaflet-control-attribution {
            font-size: 10px !important;
            letter-spacing: 1px;
        }

        .leaflet-control-attribution a {
            color: #8b7355 !important;
        }

        @media (max-width: 800px) {
            .main-layout { grid-template-columns: 1fr; height: auto; }
            #map { height: 55vh; }
            .modal-image-wrap { height: 250px; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="/search" class="home-link">к поиску</a>
        <span class="header-title">перекрёсток эпох</span>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="sidebar-block">
                <div class="block-label">начало маршрута</div>
                <p class="block-text" id="startDesc"></p>
                <div class="audio-mini" id="startAudio">
                    <span>&#9654;</span><span>прослушать вступление</span>
                </div>
            </div>

            <nav>
                <div class="route-title">маршрут</div>
                <ul class="locations-list" id="locationsList"></ul>
            </nav>

            <div class="sidebar-block">
                <div class="block-label">завершение</div>
                <p class="block-text" id="endDesc"></p>
                <div class="audio-mini" id="endAudio">
                    <span>&#9654;</span><span>прослушать заключение</span>
                </div>
            </div>
        </aside>

        <main class="map-area">
            <div class="map-toggle">
                <button id="btnModern" class="active">современная</button>
                <button id="btnHistorical">историческая</button>
            </div>
            <div id="map"></div>
            <div class="map-info-bar">
                <span class="info-title" id="excTitle"></span>
                <span class="info-stat" id="excDuration"></span>
                <span class="info-stat" id="excDistance"></span>
            </div>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <button class="modal-close">&times;</button>
            <div class="modal-image-wrap">
                <img id="modalImg" src="" alt="">
                <div class="slider-label" id="sliderLabel">современный вид</div>
                <div class="slider-overlay">
                    <button class="slider-btn" id="sliderBtn">было</button>
                </div>
            </div>
            <div class="modal-body">
                <h2 id="modalTitle"></h2>
                <p class="modal-address" id="modalAddr"></p>
                <div class="modal-tags">
                    <span id="modalYear"></span>
                    <span id="modalTags"></span>
                </div>
                <p class="modal-description" id="modalDesc"></p>
                <div class="audio-player" id="audioPlayerBlock">
                    <button class="play-btn" id="modalPlay">&#9654;</button>
                    <div class="progress-wrap">
                        <div class="progress-fill" id="progressFill"></div>
                        <input type="range" id="progressInput" min="0" value="0" step="0.1">
                    </div>
                    <span class="time-display" id="timeDisplay">00:00 / 00:00</span>
                </div>
            </div>
        </div>
    </div>

    <audio id="globalAudio" preload="none"></audio>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        const STYLE_MODERN = {
    tiles: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    filter: 'sepia(30%)'
};
const STYLE_HISTORICAL = {
    tiles: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
    filter: 'sepia(85%) contrast(1.3) brightness(0.85) saturate(0.15) grayscale(0.6)'
};
        let map, tileLayer, currentStyle = 'modern';
        let markers = [], routeLine = null;
        let excursionData = null;
        let currentLocIndex = -1;
        let currentPhotoType = 'modern';
        let modalLocation = null;
        const audio = document.getElementById('globalAudio');
        const modal = document.getElementById('modal');

        function initMap() {
            map = L.map('map', { 
                center: [56.011, 92.854], 
                zoom: 15, 
                zoomControl: false, 
                attributionControl: true 
            });
            setMapStyle('modern');
        }

        function setMapStyle(style) {
            if (tileLayer) map.removeLayer(tileLayer);
            const cfg = style === 'modern' ? STYLE_MODERN : STYLE_HISTORICAL;
            tileLayer = L.tileLayer(cfg.tiles, { 
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
                maxZoom: 19 
            }).addTo(map);
            document.getElementById('map').style.filter = cfg.filter;
            currentStyle = style;
            document.getElementById('btnModern').classList.toggle('active', style === 'modern');
            document.getElementById('btnHistorical').classList.toggle('active', style === 'historical');
        }

        async function loadExcursion() {
            const r = await fetch('/api/excursions/1/locations');
            excursionData = await r.json();
            renderSidebar();
            renderMarkers();
            drawRoute();
            updateMapInfo();
        }

        function renderSidebar() {
            const ex = excursionData.excursion;
            document.getElementById('startDesc').textContent = ex.start_description;
            document.getElementById('endDesc').textContent = ex.end_description;
            document.getElementById('startAudio').onclick = () => toggleSideAudio('start', ex.start_audio, 'startAudio');
            document.getElementById('endAudio').onclick = () => toggleSideAudio('end', ex.end_audio, 'endAudio');

            const list = document.getElementById('locationsList');
            list.innerHTML = '';
            excursionData.locations.forEach((loc, i) => {
                const li = document.createElement('li');
                li.className = 'location-item';
                li.innerHTML = `
                    <div class="location-num">${i + 1}</div>
                    <div class="location-details">
                        <div class="location-name">${loc.name}</div>
                        <div class="location-addr">${loc.address}</div>
                    </div>`;
                li.addEventListener('click', () => { selectLocation(i); openModal(loc); });
                list.appendChild(li);
                loc._el = li;
            });
        }

        function toggleSideAudio(type, file, btnId) {
            const btn = document.getElementById(btnId);
            if (audio.src.includes(file) && !audio.paused) {
                audio.pause(); btn.classList.remove('playing'); return;
            }
            stopAllSideAudio();
            audio.src = '/static/' + file;
            audio.play().then(() => btn.classList.add('playing')).catch(() => {});
        }

        function stopAllSideAudio() {
            audio.pause();
            document.querySelectorAll('.audio-mini').forEach(b => b.classList.remove('playing'));
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            excursionData.locations.forEach((loc, i) => {
                const isActive = i === currentLocIndex;
                const icon = L.divIcon({
                    className: 'custom-marker' + (isActive ? ' active-marker' : ''),
                    html: `<div class="marker-pin">${i + 1}</div>`,
                    iconSize: [34, 34], iconAnchor: [17, 17]
                });
                const marker = L.marker([loc.lat, loc.lng], { icon }).addTo(map);
                marker.on('click', () => { selectLocation(i); openModal(loc); });
                marker.bindTooltip(loc.name, { direction: 'top' });
                markers.push(marker);
            });
            if (excursionData.locations.length > 0) {
                map.fitBounds(L.latLngBounds(excursionData.locations.map(l => [l.lat, l.lng])), { padding: [40, 40] });
            }
        }

        function selectLocation(index) {
            if (currentLocIndex === index) return;
            currentLocIndex = index;
            markers.forEach((m, i) => {
                const loc = excursionData.locations[i];
                m.setIcon(L.divIcon({
                    className: 'custom-marker' + (i === index ? ' active-marker' : ''),
                    html: `<div class="marker-pin">${i + 1}</div>`,
                    iconSize: [34, 34], iconAnchor: [17, 17]
                }));
                if (loc._el) loc._el.classList.toggle('active', i === index);
            });
            map.setView([excursionData.locations[index].lat, excursionData.locations[index].lng], 17);
        }

        function drawRoute() {
            if (routeLine) map.removeLayer(routeLine);
            const fullRoute = [
                [56.0119, 92.8570], [56.0117, 92.8563], [56.0115, 92.8555],
                [56.0112, 92.8548], [56.0108, 92.8537], [56.0109, 92.8534],
                [56.0111, 92.8531], [56.0113, 92.8529], [56.0115, 92.8527],
                [56.0112, 92.8524], [56.0109, 92.8521], [56.0105, 92.8518],
                [56.0100, 92.8514], [56.0096, 92.8510], [56.0092, 92.8505]
            ];
            routeLine = L.polyline(fullRoute, {
                color: '#3b6999', weight: 4, opacity: 0.8,
                dashArray: '8, 6', lineJoin: 'round'
            }).addTo(map);
        }

        function updateMapInfo() {
            const ex = excursionData.excursion;
            document.getElementById('excTitle').textContent = ex.name;
            document.getElementById('excDuration').textContent = ex.duration;
            document.getElementById('excDistance').textContent = ex.distance;
        }

        function openModal(loc) {
            modalLocation = loc;
            currentPhotoType = 'modern';
            document.getElementById('modalImg').src = '/static/' + loc.modern_photo;
            document.getElementById('sliderLabel').textContent = 'современный вид';
            document.getElementById('sliderBtn').textContent = 'было';
            document.getElementById('modalTitle').textContent = loc.name;
            document.getElementById('modalAddr').textContent = loc.address;
            document.getElementById('modalYear').textContent = loc.year;
            document.getElementById('modalTags').textContent = loc.tags;
            document.getElementById('modalDesc').textContent = loc.description;
            document.getElementById('sliderBtn').onclick = togglePhoto;

            if (loc.audio_file) {
                document.getElementById('audioPlayerBlock').style.display = 'flex';
                audio.src = '/static/' + loc.audio_file;
                document.getElementById('modalPlay').classList.remove('playing');
                document.getElementById('progressFill').style.width = '0%';
                document.getElementById('timeDisplay').textContent = '00:00 / 00:00';
            } else {
                document.getElementById('audioPlayerBlock').style.display = 'none';
            }
            modal.style.display = 'block';
        }

        function togglePhoto() {
            const btn = document.getElementById('sliderBtn');
            if (currentPhotoType === 'modern') {
                document.getElementById('modalImg').src = '/static/' + modalLocation.historical_photo;
                document.getElementById('sliderLabel').textContent = 'исторический вид';
                btn.textContent = 'стало';
                currentPhotoType = 'historical';
            } else {
                document.getElementById('modalImg').src = '/static/' + modalLocation.modern_photo;
                document.getElementById('sliderLabel').textContent = 'современный вид';
                btn.textContent = 'было';
                currentPhotoType = 'modern';
            }
        }

        function closeModal() {
            modal.style.display = 'none';
            audio.pause();
        }

        document.getElementById('modalPlay').addEventListener('click', function() {
            if (audio.paused) {
                audio.play();
                this.classList.add('playing');
            } else {
                audio.pause();
                this.classList.remove('playing');
            }
        });

        audio.addEventListener('timeupdate', () => {
            if (!audio.duration) return;
            const pct = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressInput').value = pct;
            const cm = Math.floor(audio.currentTime / 60);
            const cs = Math.floor(audio.currentTime % 60);
            const tm = Math.floor(audio.duration / 60);
            const ts = Math.floor(audio.duration % 60);
            document.getElementById('timeDisplay').textContent =
                `${String(cm).padStart(2,'0')}:${String(cs).padStart(2,'0')} / ${String(tm).padStart(2,'0')}:${String(ts).padStart(2,'0')}`;
        });

        audio.addEventListener('ended', () => {
            document.getElementById('modalPlay').classList.remove('playing');
            stopAllSideAudio();
        });

        document.getElementById('progressInput').addEventListener('input', function() {
            if (audio.duration) audio.currentTime = (this.value / 100) * audio.duration;
        });

        document.querySelector('.modal-close').addEventListener('click', closeModal);
        modal.addEventListener('click', function(e) { if (e.target === modal) closeModal(); });

        document.getElementById('btnModern').addEventListener('click', () => setMapStyle('modern'));
        document.getElementById('btnHistorical').addEventListener('click', () => setMapStyle('historical'));

        initMap();
        loadExcursion();
    </script>
</body>
</html>
