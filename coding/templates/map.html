<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перекрёсток эпох - Карта</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: #0a0a0a;
            height: 100vh;
            animation: fadeIn 1.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .app-container {
            display: flex;
            height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 350px;
            background: linear-gradient(180deg, #1a1a2e 0%, #0a0a0a 100%);
            color: #d4a574;
            padding: 30px 20px;
            border-right: 2px solid #8b7355;
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 10px;
            letter-spacing: 5px;
            color: #f4e4c1;
        }

        .sidebar .ornament {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #8b7355, transparent);
            margin: 15px 0;
        }

        .excursion-card {
            background: rgba(139, 115, 85, 0.2);
            border: 1px solid #8b7355;
            padding: 15px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
        }

        .excursion-card:hover {
            background: rgba(139, 115, 85, 0.4);
            border-color: #d4a574;
        }

        .excursion-card h3 {
            color: #f4e4c1;
            margin-bottom: 10px;
        }

        .excursion-card p {
            font-size: 14px;
            color: #8b7355;
        }

        .back-button {
            display: block;
            width: 100%;
            padding: 10px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid #8b7355;
            color: #8b7355;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 16px;
            transition: all 0.3s;
        }

        .back-button:hover {
            border-color: #d4a574;
            color: #d4a574;
        }

        /* Карта */
        .map-wrapper {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            filter: sepia(50%) brightness(0.9);
        }

        .map-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.7);
            color: #d4a574;
            padding: 10px 30px;
            font-size: 18px;
            letter-spacing: 3px;
            border: 1px solid #8b7355;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Боковая панель -->
        <aside class="sidebar">
            <h2>Перекрёсток Эпох</h2>
            <div class="ornament"></div>
            
            <div id="excursionsList">
                <p style="text-align:center;color:#8b7355;">Загрузка экскурсий...</p>
            </div>
            
            <div class="ornament"></div>
            
            <button class="back-button" onclick="window.location.href='/'">
                ← На главную
            </button>
        </aside>
        
        <!-- Карта -->
        <div class="map-wrapper">
            <div class="map-title">Красноярск исторический</div>
            <div id="map"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // Инициализация карты
        const map = L.map('map').setView([56.0105, 92.8525], 14);
        
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap',
            maxZoom: 18
        }).addTo(map);

        // Загрузка экскурсий
        async function loadExcursions() {
            try {
                const response = await fetch('/api/excursions');
                const excursions = await response.json();
                
                const listContainer = document.getElementById('excursionsList');
                listContainer.innerHTML = '';
                
                excursions.forEach(excursion => {
                    const card = document.createElement('div');
                    card.className = 'excursion-card';
                    card.innerHTML = `
                        <h3>${excursion.name}</h3>
                        <p>${excursion.description}</p>
                        <p style="margin-top:10px;">
                            ⏱️ ${excursion.duration} | 📏 ${excursion.distance}
                        </p>
                    `;
                    
                    card.addEventListener('click', () => loadExcursionLocations(excursion.id));
                    listContainer.appendChild(card);
                });
            } catch (error) {
                console.error('Ошибка загрузки:', error);
            }
        }

        // Загрузка локаций экскурсии
        async function loadExcursionLocations(excursionId) {
            try {
                const response = await fetch(`/api/excursions/${excursionId}/locations`);
                const data = await response.json();
                
                // Очищаем маркеры
                map.eachLayer(layer => {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });
                
                // Добавляем маркеры
                data.locations.forEach((location, index) => {
                    const marker = L.marker([location.lat, location.lng])
                        .addTo(map)
                        .bindPopup(`
                            <div style="font-family:Georgia;padding:5px;">
                                <h3 style="color:#3e2723;">${location.name}</h3>
                                <p>${location.description.substring(0, 100)}...</p>
                                <small>📅 ${location.year}</small>
                            </div>
                        `);
                });
                
                // Центрируем карту
                if (data.locations.length > 0) {
                    map.setView([data.locations[0].lat, data.locations[0].lng], 14);
                }
            } catch (error) {
                console.error('Ошибка загрузки локаций:', error);
            }
        }

        // Загрузка при старте
        loadExcursions();
    </script>
</body>
</html>
